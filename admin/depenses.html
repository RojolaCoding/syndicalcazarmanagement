<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#059669" />
  <title>Dépenses — Syndic Alcazar</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>
  <div id="app">
    <div class="loader-page"><div><span class="loader"></span> Chargement…</div></div>
  </div>

  <script type="module">
    import { requireAuth, Role } from "/assets/js/auth.js";
    import { mountShell } from "/assets/js/shell.js";
    import { db, storage } from "/assets/js/firebase-init.js";
    import {
      collection, getDocs, doc, addDoc, updateDoc, deleteDoc, query, orderBy, serverTimestamp,
    } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-storage.js";
    import { formatMAD, formatDateFR, escapeHtml, toast } from "/assets/js/utils.js";

    const session = await requireAuth(Role.ADMIN);
    if (!session) throw new Error("redirected");

    const CAT_LABEL = { FIXE: "Fixe", VARIABLE: "Variable", EXCEPTIONNELLE: "Exceptionnelle" };
    const CAT_BADGE = { FIXE: "badge-success", VARIABLE: "badge-warning", EXCEPTIONNELLE: "badge-danger" };

    let depenses = [];
    let charges = [];
    let filterCat = "TOUS";

    async function loadAll() {
      const [dSnap, cSnap] = await Promise.all([
        getDocs(query(collection(db, "depenses"), orderBy("dateDepense", "desc"))),
        getDocs(collection(db, "chargesRecurrentes")),
      ]);
      depenses = dSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      charges = cSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    function statsForPeriod(days) {
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - days);
      return depenses
        .filter(d => d.dateDepense && new Date(d.dateDepense) >= cutoff)
        .reduce((s, d) => s + (d.montant || 0), 0);
    }

    function render() {
      const filtered = filterCat === "TOUS" ? depenses : depenses.filter(d => d.categorie === filterCat);
      const totalMois = statsForPeriod(30);
      const totalTrim = statsForPeriod(90);
      const totalAn = statsForPeriod(365);

      document.getElementById("page-content").innerHTML = `
        <div class="page-header">
          <div>
            <div class="page-title">Dépenses</div>
            <div class="page-subtitle">${depenses.length} dépense(s) enregistrée(s)</div>
          </div>
          <div class="page-actions">
            <button class="btn btn-primary" id="btn-add">+ Nouvelle dépense</button>
          </div>
        </div>

        <div class="grid grid-cols-1 grid-cols-md-3 mb-6">
          <div class="kpi">
            <div class="kpi-label">30 derniers jours</div>
            <div class="kpi-value">${formatMAD(totalMois)}</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">90 derniers jours</div>
            <div class="kpi-value">${formatMAD(totalTrim)}</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">12 derniers mois</div>
            <div class="kpi-value">${formatMAD(totalAn)}</div>
          </div>
        </div>

        <div class="filters">
          ${["TOUS", "FIXE", "VARIABLE", "EXCEPTIONNELLE"].map(c => `
            <button class="filter-chip ${filterCat === c ? "active" : ""}" data-filter="${c}">
              ${c === "TOUS" ? "Toutes" : CAT_LABEL[c]}
              <span style="opacity:0.7"> (${c === "TOUS" ? depenses.length : depenses.filter(d => d.categorie === c).length})</span>
            </button>
          `).join("")}
        </div>

        <div class="card">
          ${filtered.length === 0 ? `
            <div class="card-body text-muted text-center">
              Aucune dépense ${filterCat === "TOUS" ? "" : "dans cette catégorie"}.
              Cliquez sur « + Nouvelle dépense » pour commencer.
            </div>
          ` : `
            <div class="table-wrapper">
              <table class="table">
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Libellé</th>
                    <th>Catégorie</th>
                    <th>Fournisseur</th>
                    <th class="text-right">Montant</th>
                    <th>Justif.</th>
                    <th>Public</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  ${filtered.map(d => `
                    <tr>
                      <td class="text-sm">${d.dateDepense ? formatDateFR(d.dateDepense) : "—"}</td>
                      <td><strong>${escapeHtml(d.libelle || "—")}</strong></td>
                      <td><span class="badge ${CAT_BADGE[d.categorie] || "badge-neutral"}">${CAT_LABEL[d.categorie] || d.categorie}</span></td>
                      <td class="text-sm text-muted">${escapeHtml(d.fournisseur || "—")}</td>
                      <td class="text-right"><strong>${formatMAD(d.montant || 0)}</strong></td>
                      <td>${d.justificatifUrl ? `<a href="${escapeHtml(d.justificatifUrl)}" target="_blank" rel="noopener" class="text-sm">📎 Voir</a>` : "<span class='text-muted text-sm'>—</span>"}</td>
                      <td>${d.visiblePublic !== false ? '<span class="badge badge-success">Oui</span>' : '<span class="badge badge-neutral">Non</span>'}</td>
                      <td class="text-right" style="white-space:nowrap">
                        <button class="btn btn-ghost btn-sm" data-edit="${d.id}">Éditer</button>
                        <button class="btn btn-ghost btn-sm" data-delete="${d.id}" style="color:#dc2626">×</button>
                      </td>
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          `}
        </div>
      `;

      document.getElementById("btn-add").addEventListener("click", () => openModal());
      document.querySelectorAll("[data-filter]").forEach(el => {
        el.addEventListener("click", () => { filterCat = el.dataset.filter; render(); });
      });
      document.querySelectorAll("[data-edit]").forEach(el => {
        el.addEventListener("click", () => openModal(el.dataset.edit));
      });
      document.querySelectorAll("[data-delete]").forEach(el => {
        el.addEventListener("click", () => deleteDepense(el.dataset.delete));
      });
    }

    async function deleteDepense(id) {
      if (!confirm("Supprimer cette dépense ? Action irréversible.")) return;
      try {
        await deleteDoc(doc(db, "depenses", id));
        toast("Dépense supprimée.", "success");
        await loadAll();
        render();
      } catch (err) {
        toast("Erreur : " + err.message, "error");
      }
    }

    function openModal(editId = null) {
      const existing = editId ? depenses.find(d => d.id === editId) : null;
      const today = new Date().toISOString().split("T")[0];

      const overlay = document.createElement("div");
      overlay.className = "modal-overlay";
      overlay.innerHTML = `
        <div class="modal">
          <div class="modal-header">
            <div class="modal-title">${existing ? "Éditer la dépense" : "Nouvelle dépense"}</div>
            <button class="modal-close" id="m-close">×</button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label class="form-label">Libellé *</label>
              <input class="form-input" id="d-libelle" value="${escapeHtml(existing?.libelle || "")}" required />
            </div>
            <div class="grid grid-cols-2">
              <div class="form-group">
                <label class="form-label">Catégorie *</label>
                <select class="form-select" id="d-categorie" required>
                  <option value="FIXE" ${existing?.categorie === "FIXE" ? "selected" : ""}>Fixe (récurrente)</option>
                  <option value="VARIABLE" ${existing?.categorie === "VARIABLE" ? "selected" : ""}>Variable</option>
                  <option value="EXCEPTIONNELLE" ${existing?.categorie === "EXCEPTIONNELLE" ? "selected" : ""}>Exceptionnelle</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Date *</label>
                <input class="form-input" type="date" id="d-date" value="${existing?.dateDepense ? new Date(existing.dateDepense).toISOString().split('T')[0] : today}" required />
              </div>
            </div>
            <div class="grid grid-cols-2">
              <div class="form-group">
                <label class="form-label">Montant (DH) *</label>
                <input class="form-input" type="number" step="0.01" id="d-montant" value="${existing?.montant || ""}" required />
              </div>
              <div class="form-group">
                <label class="form-label">Fournisseur</label>
                <input class="form-input" id="d-fournisseur" value="${escapeHtml(existing?.fournisseur || "")}" />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Charge récurrente liée (optionnel)</label>
              <select class="form-select" id="d-charge">
                <option value="">— Aucune —</option>
                ${charges.map(c => `<option value="${c.id}" ${existing?.chargeRecurrenteId === c.id ? "selected" : ""}>${escapeHtml(c.libelle)} (${formatMAD(c.montantMensuelAttendu)}/mois)</option>`).join("")}
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Justificatif (image ou PDF, max 10 MB)</label>
              <input class="form-input" type="file" id="d-file" accept="image/*,application/pdf" />
              ${existing?.justificatifUrl ? `<p class="form-help">Actuel : <a href="${escapeHtml(existing.justificatifUrl)}" target="_blank" rel="noopener">📎 Voir le justificatif existant</a></p>` : ""}
            </div>
            <div class="form-group">
              <label class="form-label">
                <input type="checkbox" id="d-public" ${existing?.visiblePublic !== false ? "checked" : ""} />
                Visible publiquement (recommandé pour la transparence)
              </label>
              <p class="form-help">Pense à anonymiser/flouter les RIB et coordonnées privées sur l'image avant upload.</p>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" id="m-cancel">Annuler</button>
            <button class="btn btn-primary" id="m-save">${existing ? "Mettre à jour" : "Enregistrer"}</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      const close = () => overlay.remove();
      document.getElementById("m-close").addEventListener("click", close);
      document.getElementById("m-cancel").addEventListener("click", close);
      overlay.addEventListener("click", e => { if (e.target === overlay) close(); });

      document.getElementById("m-save").addEventListener("click", async () => {
        const libelle = document.getElementById("d-libelle").value.trim();
        const categorie = document.getElementById("d-categorie").value;
        const dateStr = document.getElementById("d-date").value;
        const montant = parseFloat(document.getElementById("d-montant").value);
        const fournisseur = document.getElementById("d-fournisseur").value.trim() || null;
        const chargeId = document.getElementById("d-charge").value || null;
        const visible = document.getElementById("d-public").checked;
        const file = document.getElementById("d-file").files[0];

        if (!libelle || !montant || !dateStr) {
          toast("Libellé, montant et date sont obligatoires.", "error");
          return;
        }

        const btn = document.getElementById("m-save");
        btn.disabled = true;
        btn.innerHTML = '<span class="loader"></span> Enregistrement…';

        try {
          let justificatifUrl = existing?.justificatifUrl || null;
          if (file) {
            btn.innerHTML = '<span class="loader"></span> Upload…';
            if (file.size > 10 * 1024 * 1024) throw new Error("Fichier trop gros (max 10 MB)");
            const ext = file.name.split(".").pop();
            const path = `justificatifs/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
            const r = ref(storage, path);
            await uploadBytes(r, file);
            justificatifUrl = await getDownloadURL(r);
          }

          const data = {
            libelle, categorie, montant,
            dateDepense: new Date(dateStr).toISOString(),
            fournisseur, chargeRecurrenteId: chargeId,
            visiblePublic: visible,
            justificatifUrl,
          };

          if (existing) {
            await updateDoc(doc(db, "depenses", existing.id), data);
            toast("Dépense mise à jour.", "success");
          } else {
            data.createdAt = serverTimestamp();
            data.createdBy = session.uid;
            await addDoc(collection(db, "depenses"), data);
            toast("Dépense ajoutée.", "success");
          }
          close();
          await loadAll();
          render();
        } catch (err) {
          console.error(err);
          toast("Erreur : " + err.message, "error");
          btn.disabled = false;
          btn.textContent = existing ? "Mettre à jour" : "Enregistrer";
        }
      });
    }

    document.getElementById("app").innerHTML = '<div id="page-content"><div class="loader-page"><div><span class="loader"></span> Chargement…</div></div></div>';
    mountShell(Role.ADMIN, session.profile);
    await loadAll();
    render();
  </script>
</body>
</html>
