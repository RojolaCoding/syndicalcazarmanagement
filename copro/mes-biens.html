<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#059669" />
  <title>Mes biens — Syndic Alcazar</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>
  <div id="app">
    <div class="loader-page"><div><span class="loader"></span> Chargement…</div></div>
  </div>

  <script type="module">
    import { requireAuth } from "/assets/js/auth.js";
    import { mountShell } from "/assets/js/shell.js";
    import { db } from "/assets/js/firebase-init.js";
    import { collection, getDocs, getDoc, doc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";
    import { formatMAD, formatDateFR, escapeHtml } from "/assets/js/utils.js";

    const session = await requireAuth();
    if (!session) throw new Error("redirected");

    function formatPeriodFR(p) {
      const [y, m] = p.split("-");
      const months = ["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];
      return `${months[parseInt(m,10)-1]} ${y}`;
    }

    // Mes biens (via propertyOwnerships)
    const ownSnap = await getDocs(query(collection(db, "propertyOwnerships"), where("userId", "==", session.uid)));
    const ownerships = ownSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    let myBiens = [];
    if (ownerships.length > 0) {
      myBiens = (await Promise.all(ownerships.map(async (o) => {
        const s = await getDoc(doc(db, "biens", o.bienId));
        return s.exists() ? { ...s.data(), id: s.id, quotePart: o.quotePart } : null;
      }))).filter(Boolean);
    }

    // Cotisations de mes biens
    let myCotisations = [];
    if (myBiens.length > 0) {
      const allCot = await getDocs(query(collection(db, "cotisations"), orderBy("periode", "desc")));
      const ids = new Set(myBiens.map(b => b.id));
      myCotisations = allCot.docs.map(d => ({ id: d.id, ...d.data() })).filter(c => ids.has(c.bienId));
    }

    function biencontent(b) {
      const cs = myCotisations.filter(c => c.bienId === b.id);
      const totalDu = cs.reduce((s, c) => s + (c.montantDu || 0), 0);
      const totalPaye = cs.reduce((s, c) => s + (c.montantPaye || 0), 0);
      const solde = totalDu - totalPaye;
      return `
        <div class="card mb-6">
          <div class="card-header">
            <div class="flex justify-between items-center" style="flex-wrap: wrap; gap: 1rem;">
              <div>
                <div class="card-title">${escapeHtml(b.displayName || b.numero)}</div>
                <div class="card-description">
                  ${b.typeLogement ? `${b.typeLogement} · ` : ""}
                  ${b.face === "CARREFOUR" ? "Face carrefour · " : b.face === "RESIDENCE" ? "Face résidence · " : ""}
                  Étage ${b.etage}
                  ${b.quotePart < 100 ? ` · Quote-part ${b.quotePart}%` : ""}
                </div>
              </div>
              <div class="text-right">
                <div class="text-xs text-muted">SOLDE</div>
                <div style="font-size: 1.25rem; font-weight: 700; color: ${solde <= 0 ? 'var(--color-primary)' : 'var(--color-danger)'};">
                  ${solde <= 0 ? "À jour" : formatMAD(solde)}
                </div>
              </div>
            </div>
          </div>
          <div class="card-body">
            <div class="grid grid-cols-2 grid-cols-md-4 mb-4">
              <div><div class="text-xs text-muted">Tantième</div><div><strong>${(b.tantieme || 0).toLocaleString("fr-FR")} / 10 000</strong></div></div>
              <div><div class="text-xs text-muted">Surface hab.</div><div><strong>${b.surfaceHabitable || 0} m²</strong></div></div>
              <div><div class="text-xs text-muted">Cotisation/mois</div><div><strong>${formatMAD(b.cotisationMensuelle || 0)}</strong></div></div>
              <div><div class="text-xs text-muted">Statut</div><div><strong>${b.statut === "OCCUPE" ? "Occupé" : "Vacant"}</strong></div></div>
            </div>

            <div class="mb-2"><strong>Historique des paiements</strong></div>
            ${cs.length === 0 ? `
              <p class="text-muted text-sm">Aucune cotisation enregistrée pour l'instant.</p>
            ` : `
              <div class="table-wrapper">
                <table class="table">
                  <thead>
                    <tr>
                      <th>Période</th>
                      <th class="text-right">Dû</th>
                      <th class="text-right">Payé</th>
                      <th>Date</th>
                      <th>Mode</th>
                      <th>N° reçu</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${cs.map(c => {
                      const paid = c.montantPaye || 0;
                      const due = c.montantDu || 0;
                      const statusBadge = paid >= due
                        ? '<span class="badge badge-success">payée</span>'
                        : paid > 0
                          ? '<span class="badge badge-warning">partielle</span>'
                          : '<span class="badge badge-danger">due</span>';
                      return `
                        <tr>
                          <td><strong>${formatPeriodFR(c.periode)}</strong> ${statusBadge}</td>
                          <td class="text-right">${formatMAD(due)}</td>
                          <td class="text-right">${formatMAD(paid)}</td>
                          <td class="text-sm">${c.datePaiement ? formatDateFR(c.datePaiement) : "—"}</td>
                          <td class="text-sm">${c.modePaiement || "—"}</td>
                          <td class="text-sm">${c.recuNumero || "—"}</td>
                        </tr>
                      `;
                    }).join("")}
                  </tbody>
                </table>
              </div>
            `}
          </div>
        </div>
      `;
    }

    document.getElementById("app").innerHTML = `
      <div id="page-content">
        <div class="page-header">
          <div>
            <div class="page-title">Mes biens</div>
            <div class="page-subtitle">Vos propriétés et l'historique de vos paiements</div>
          </div>
        </div>

        ${myBiens.length === 0 ? `
          <div class="alert alert-warning">
            Aucun bien ne vous est associé pour l'instant. Si vous pensez que c'est une erreur,
            contactez le syndic pour qu'il vérifie votre dossier.
          </div>
        ` : myBiens.map(biencontent).join("")}
      </div>
    `;
    mountShell(session.profile.role, session.profile);
  </script>
</body>
</html>
